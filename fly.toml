# fly.toml app configuration for stage-2-task
# See https://fly.io/docs/reference/configuration/

app = 'stage-2-task'
primary_region = 'lhr'

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
